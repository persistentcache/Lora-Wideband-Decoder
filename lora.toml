# LORA Wideband Decoder — central config.
#############################################################################################################################
# Radio Settings

[radio]
rate_hz       = 28000000     # SDR sample rate (full bandwidth to monitor)
# rate_hz     = 20000000     # ALT: 20 Msps for hosts that can't sustain 28 (laptops, thermal-limited SBCs).

bandwidth_hz  = 28000000     # SDR RX bandwidth (Covers all US915 channels.)

center_mhz    = 915.0        # SDR center freq (park between channels so the DC spike doesn't sit on a signal)
# center_mhz  = 868.0        # ALT: EU868 band centre.
# center_mhz  = 433.0        # ALT: 433 MHz ISM band.

format        = "sc16"       # bladeRF stream format
# format      = "cs8"        # ALT: 8-bit IQ (HackRF native, half the I/O bandwidth).

# gain        = 48           # OPTIONAL global RX gain (dB). If unset (default), each SDR uses ITS OWN profile                             
# gain        = "auto"       # ALT: hardware AGC (works on HackRF/RTL-SDR; bladeRF AGC undershoots vs fixed 48 dB).

#############################################################################################################################
# Detection Settings

[detect]
threshold        = 0.55      # Schmidl-Cox preamble threshold (Recommended NOT to change)
# threshold      = 0.45      # ALT: looser detector — catches more weak preambles, more phantom-preamble captures the decoder rejects.
# threshold      = 0.65      # ALT: stricter and fewer false fires in noisy RF.

energy_threshold = 6.0       # gate energy-peak threshold (dB above PSD median).
                             # Sensitive by default: SC + dechirp reject noise (measured zero false
                             # positives at 5-6 dB live and on recordings), and the gate now sheds its
                             # weakest candidate peaks automatically if the host falls behind — so the
                             # low threshold costs accuracy nothing.  The old strict 12.0 measured 0/3
                             # detections on real ~13 dB-SNR SF7/500k beacons that 5.0 caught 3/3.
# energy_threshold = 12.0    # ALT: old strict default — only if a busy/spurry band overwhelms a very
                             # weak host even with the automatic peak throttle.
                             
overlap          = 0.5       # window overlap (0.5 = 50%)
# overlap        = 0.25      # ALT: less overlap → lower CPU, may miss edge-aligned packets.
# overlap        = 0.75      # ALT: more overlap → better edge coverage, more CPU.

detect_workers   = -1        # -1 = auto-scale from cpu_count. Changing this to something such as 2 pins usage to only 2 cores.

buf_seconds      = 16        # ring buffer seconds (bigger = more burst headroom)
# buf_seconds    = 8         # ALT: smaller ring buffer (less RAM, less burst headroom).
# buf_seconds    = 32        # ALT: bigger buffer for very bursty traffic.

commit_lag       = 4         # detect-pool commit depth (lower = lower latency)
# commit_lag     = 2         # ALT: lower latency at the cost of slightly more rework.
# commit_lag     = 8         # ALT: more stable on slow disks / busy hosts.

#############################################################################################################################
# Decode Settings

[decode]
budget_s    = 10.0                       # per-capture decode CPU budget
# budget_s  = 5.0                        # ALT: tight budget for low-latency
# budget_s  = 20.0                       # ALT: generous budget for SF11/12-heavy traffic

workers     = -1                         # -1 = auto-scale from cpu_count. Set a positive integer ONLY to pin it.
# workers   = 4                          # ALT: pin to 4 decode workers (reserve cores for other apps).
# workers   = 12                         # ALT: pin to 12 — useful on dedicated hosts when you've measured a different sweet spot than the auto-scaler.

export_dir   = "/dev/shm/live_caps"       # where captures are written (tmpfs)
# export_dir = "/tmp/live_caps"          # ALT: disk-backed captures (slower, but persists across reboot).


packet_log  = "/tmp/lora_packets.jsonl"  # structured packet log the web tails

key         = "default"                  # "default" | "NOKEY" | hex/base64 PSK
# key       = "NOKEY"                    # ALT: skip Meshtastic AES — surface all packets encrypted-only.
# key       = "1PG7OiApB1nwvP+rz05pAQ==" # ALT: custom PSK (base64) for a private Meshtastic channel.

export_dec  = 8                          # capture oversampling — 8 = 2 MHz for SF7/BW250.
                                         # Higher rate gives clean dechirp + better
                                         # PA-onset temporal resolution for fingerprinting.
                                         # Decode keeps up at this rate IF the gate's
                                         # energy_threshold (6.0 default) filters noise.
                                         
# export_dec = 4                         # ALT: 4 Msps captures — faster decode, less fingerprint resolution.
# export_dec = 16                        # ALT: 1 Msps captures — highest fingerprint resolution, slowest decode.

#############################################################################################################################
# Web-GUI Settings

[web]
host = "127.0.0.1"   # localhost-only. Set to "0.0.0.0" to expose on the LAN.
port = 5000          # Port the web service runs on. Can be changed in case of conflictions.
